name: Automated NixOS ISO Build

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: write

jobs:
  build-iso:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: determinatesystems/nix-installer-action@v14

      - name: Magic Nix Cache
        uses: determinatesystems/magic-nix-cache-action@v8

      - name: Build Custom ISO with Input Override
        run: |
          nix build .#iso-installer --recreate-lock-file

      - name: Prepare ISO File for Release
        run: |
          mkdir -p dist
          cp -L result/iso/*.iso dist/nixos-custom-installer.iso

      - name: Upload ISO to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || 'latest' }}
          name: ${{ github.ref_type == 'tag' && format('Release {0}', github.ref_name) || 'Latest Custom ISO Build' }}
          draft: false
          prerelease: false
          files: dist/nixos-custom-installer.iso
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
